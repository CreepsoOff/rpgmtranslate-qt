# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          rpgmtranslate-qt – Windows x64 build & release workflow        ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  HOW TO PUBLISH A RELEASE                                               ║
# ║  ─────────────────────────                                              ║
# ║  1. Commit and push all changes to your branch.                         ║
# ║  2. Either:                                                             ║
# ║     • Push a semver tag for a stable release:                           ║
# ║         git tag v1.2.3                                                  ║
# ║         git push origin v1.2.3                                          ║
# ║     • Or trigger the workflow manually from GitHub UI.                  ║
# ║  3. This workflow builds the app, packages it, and publishes a          ║
# ║     GitHub Release with a .7z asset automatically.                      ║
# ║                                                                         ║
# ║  Manual workflow behavior:                                              ║
# ║     • no input            → tag "latest", asset rpgmtranslate.7z        ║
# ║     • dev                 → tag "dev", asset rpgmtranslate-dev.7z       ║
# ║                             pre-release                                 ║
# ║     • version=v1.2.3      → tag "v1.2.3",                               ║
# ║                             asset rpgmtranslate-v1.2.3.7z               ║
# ║     • dev + version       → tag "dev",                                  ║
# ║                             asset rpgmtranslate-dev-v1.2.3.7z           ║
# ║                             pre-release                                 ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  VARIABLES TO ADJUST IF THE BUILD CONFIGURATION CHANGES                 ║
# ║  ───────────────────────────────────────────────────────                 ║
# ║  QT_VERSION    Qt version to install. The project requires Qt 6.x       ║
# ║                with MSVC 2022 64-bit support.                           ║
# ║  BUILD_DIR     CMake build directory (relative to the repository root). ║
# ║  EXE_NAME      Compiled executable name. Must match PROJECT_NAME in     ║
# ║                CMakeLists.txt (currently "rpgmtranslate").              ║
# ║  EXE_REL_PATH  Path inside BUILD_DIR where the Visual Studio            ║
# ║                multi-config generator places Release binaries.          ║
# ║                CMakeLists.txt sets CMAKE_RUNTIME_OUTPUT_DIRECTORY =     ║
# ║                "target/bin"; VS appends the config sub-folder, giving   ║
# ║                "target\bin\Release".                                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: Build and Release – Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version optionnelle (ex: v1.2.3)'
        required: false
        default: ''
        type: string
      dev:
        description: 'Dev build ?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  QT_VERSION: '6.8.2'
  BUILD_DIR: build
  EXE_NAME: rpgmtranslate.exe
  EXE_REL_PATH: target\bin\Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index
            ~\.cargo\registry\cache
            ~\.cargo\git\db
          key: cargo-reg-${{ hashFiles('rust/Cargo.toml') }}
          restore-keys: |
            cargo-reg-

      - name: Cache Rust/Corrosion build artefacts
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}\cargo
          key: cargo-build-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: |
            cargo-build-

      - name: Cache cbindgen binary
        id: cb
        uses: actions/cache@v4
        with:
          path: ~\.cargo\bin\cbindgen.exe
          key: cbindgen-0.29.2

      - name: Install cbindgen
        if: steps.cb.outputs.cache-hit != 'true'
        run: cargo install cbindgen --version 0.29.2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Resolve Qt root
        shell: pwsh
        run: |
          $root = $env:QT_ROOT_DIR

          if (-not $root) {
            $root = $env:Qt6_DIR
            while ($root -and -not (Test-Path (Join-Path $root "bin\qmake.exe"))) {
              $root = Split-Path $root -Parent
            }
          }

          if (-not $root -or -not (Test-Path (Join-Path $root "bin\qmake.exe"))) {
            throw "Cannot resolve Qt root. QT_ROOT_DIR='$env:QT_ROOT_DIR', Qt6_DIR='$env:Qt6_DIR'"
          }

          Write-Host "QT_ROOT = $root"
          "QT_ROOT=$root" >> $env:GITHUB_ENV

      - name: Install LibArchive via vcpkg
        run: vcpkg install libarchive:x64-windows-static

      - name: Resolve vcpkg toolchain file
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner"
          }

          $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT "scripts\buildsystems\vcpkg.cmake"

          if (-not (Test-Path $toolchain)) {
            throw "vcpkg toolchain file not found: $toolchain"
          }

          Write-Host "VCPKG_TOOLCHAIN_FILE = $toolchain"
          "VCPKG_TOOLCHAIN_FILE=$toolchain" >> $env:GITHUB_ENV

      - name: Fetch rapidhash.h
        shell: pwsh
        run: |
          $dir = "${{ github.workspace }}\deps\rapidhash"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Nicoshev/rapidhash/master/rapidhash.h" `
            -OutFile "$dir\rapidhash.h"
          "RAPIDHASH_DIR=$dir" >> $env:GITHUB_ENV

      - name: Patch CMakeLists for MSVC C17 compatibility
        shell: pwsh
        run: |
          $path = "CMakeLists.txt"
          $content = Get-Content -Path $path -Raw

          $pattern = '(?s)# Set standards for C and C\+\+\s*set\(CMAKE_C_STANDARD 23\)\s*set\(CMAKE_C_STANDARD_REQUIRED ON\)\s*set\(CMAKE_CXX_STANDARD 23\)\s*set\(CMAKE_CXX_STANDARD_REQUIRED ON\)'
          $replacement = "# Set standards for C and C++`nif (MSVC)`n    set(CMAKE_C_STANDARD 17)`nelse()`n    set(CMAKE_C_STANDARD 23)`nendif()`nset(CMAKE_C_STANDARD_REQUIRED ON)`nset(CMAKE_CXX_STANDARD 23)`nset(CMAKE_CXX_STANDARD_REQUIRED ON)"

          $newContent = [regex]::Replace($content, $pattern, $replacement)

          if ($newContent -eq $content) {
            throw "Expected C/C++ standard block not found in CMakeLists.txt"
          }

          Set-Content -Path $path -Value $newContent -NoNewline
          Write-Host "Patched CMakeLists.txt for MSVC compatibility"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT" `
            -DRAPIDHASH_INCLUDE_DIRS="$env:RAPIDHASH_DIR"

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel

      - name: Resolve deploy directory
        shell: pwsh
        run: |
          $dir = Join-Path "${{ github.workspace }}" "${{ env.BUILD_DIR }}\${{ env.EXE_REL_PATH }}"
          if (-not (Test-Path $dir)) {
            throw "Deploy directory not found: $dir"
          }
          "DEPLOY_DIR=$dir" >> $env:GITHUB_ENV

      - name: Deploy Qt runtime (windeployqt)
        run: windeployqt --release --no-translations "$env:DEPLOY_DIR\${{ env.EXE_NAME }}"

      - name: Compute release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_DEV: ${{ github.event.inputs.dev }}
        run: |
          set -euo pipefail

          VERSION_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+$'

          INPUT_VERSION="${INPUT_VERSION:-}"
          INPUT_DEV="${INPUT_DEV:-false}"

          if [[ -n "$INPUT_VERSION" && ! "$INPUT_VERSION" =~ $VERSION_REGEX ]]; then
            echo "::error::The version input must match v1.2.3"
            exit 1
          fi

          TAG=""
          PRERELEASE="false"
          VERSION_FOR_SUFFIX=""

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            if [[ ! "$REF_NAME" =~ $VERSION_REGEX ]]; then
              echo "::error::Pushed tag must match v1.2.3"
              exit 1
            fi
            TAG="$REF_NAME"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX="$REF_NAME"
          elif [[ "$INPUT_DEV" == "true" ]]; then
            TAG="dev"
            PRERELEASE="true"
            VERSION_FOR_SUFFIX="$INPUT_VERSION"
          elif [[ -n "$INPUT_VERSION" ]]; then
            TAG="$INPUT_VERSION"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX="$INPUT_VERSION"
          else
            TAG="latest"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX=""
          fi

          SUFFIX=""
          [[ "$TAG" == "dev" ]] && SUFFIX="${SUFFIX}-dev"
          [[ -n "$VERSION_FOR_SUFFIX" ]] && SUFFIX="${SUFFIX}-${VERSION_FOR_SUFFIX}"

          NAME="rpgmtranslate${SUFFIX}"
          ARCHIVE="${NAME}.7z"

          if [[ "$TAG" == "latest" ]]; then
            TITLE="Latest Build"
            MAKE_LATEST="false"
          elif [[ "$TAG" == "dev" ]]; then
            if [[ -n "$VERSION_FOR_SUFFIX" ]]; then
              TITLE="Dev Build (${VERSION_FOR_SUFFIX})"
            else
              TITLE="Dev Build"
            fi
            MAKE_LATEST="false"
          else
            TITLE="Release ${TAG}"
            MAKE_LATEST="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.meta.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.meta.outputs.tag }}" --force

      - name: Create .7z archive
        shell: pwsh
        run: |
          7z a -t7z -mx=9 `
            "${{ github.workspace }}\${{ steps.meta.outputs.archive }}" `
            "$env:DEPLOY_DIR\*"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ github.workspace }}\${{ steps.meta.outputs.archive }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.title }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            ${{ github.workspace }}/${{ steps.meta.outputs.archive }}
