# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          rpgmtranslate-qt – Windows x64 build & release workflow        ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  HOW TO PUBLISH A RELEASE                                               ║
# ║  ─────────────────────────                                              ║
# ║  1. Commit and push all changes to your branch.                         ║
# ║  2. Create and push a semver tag:                                       ║
# ║       git tag v1.2.3                                                    ║
# ║       git push origin v1.2.3                                            ║
# ║  3. This workflow builds the app, packages it, and publishes a          ║
# ║     GitHub Release with the ZIP asset automatically.                    ║
# ║                                                                         ║
# ║  You can also trigger a manual build from the GitHub UI:                ║
# ║       Actions → "Build and Release – Windows" → Run workflow            ║
# ║  The optional "version" input (e.g. v1.2.3) lets you name the assets   ║
# ║  and – when provided – also publishes a GitHub Release.                 ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  VARIABLES TO ADJUST IF THE BUILD CONFIGURATION CHANGES                ║
# ║  ───────────────────────────────────────────────────────                ║
# ║  QT_VERSION    Qt version to install.  The project requires Qt 6.x      ║
# ║                with MSVC 2022 64-bit support.                           ║
# ║  BUILD_DIR     CMake build directory (relative to the repository root). ║
# ║  EXE_NAME      Compiled executable name.  Must match PROJECT_NAME in    ║
# ║                CMakeLists.txt (currently "rpgmtranslate").              ║
# ║  EXE_REL_PATH  Path inside BUILD_DIR where the Visual Studio            ║
# ║                multi-config generator places Release binaries.          ║
# ║                CMakeLists.txt sets CMAKE_RUNTIME_OUTPUT_DIRECTORY =     ║
# ║                "target/bin"; VS appends the config sub-folder, giving   ║
# ║                "target\bin\Release".                                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          rpgmtranslate-qt – Windows x64 build & release                 ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Default (no inputs)        → "latest" release, asset: rpgmtranslate   ║
# ║  dev checked                → "-dev" suffix, marked as pre-release     ║
# ║  version = "v1.2.3"         → "-v1.2.3" suffix, tagged release        ║
# ║  dev + version              → "-dev-v1.2.3", pre-release              ║
# ║  Push v* tag                → same as providing that version manually  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: Build and Release – Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.2.3). Empty → "latest".'
        required: false
        default: ''
        type: string
      dev:
        description: 'Dev build?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  QT_VERSION: '6.8.2'
  BUILD_DIR: build
  EXE_NAME: rpgmtranslate.exe
  # VS multi-config generator puts Release binaries in this subfolder.
  # CMakeLists.txt sets CMAKE_RUNTIME_OUTPUT_DIRECTORY = target/bin
  EXE_REL_PATH: target\bin\Release

jobs:
  build:
    runs-on: windows-latest
    steps:

      # ─── Source ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ─── Rust + cbindgen ─────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index
            ~\.cargo\registry\cache
            ~\.cargo\git\db
          key: cargo-reg-${{ hashFiles('rust/Cargo.toml') }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}\cargo
          key: cargo-build-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: cargo-build-

      - uses: actions/cache@v4
        id: cb
        with:
          path: ~\.cargo\bin\cbindgen.exe
          key: cbindgen-0.29.2

      - if: steps.cb.outputs.cache-hit != 'true'
        run: cargo install cbindgen --version 0.29.2

      # ─── Qt 6 (dynamic, MSVC 2022 x64) ──────────────────────────────────
      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      # install-qt-action@v4 sets QT_ROOT_DIR to the Qt install root
      # (e.g. D:\a\repo\Qt\6.8.2\msvc2022_64). This already contains
      # bin/qmake.exe and lib/cmake/Qt6 — exactly what CMAKE_PREFIX_PATH needs.
      - name: Resolve Qt root
        run: |
          if (!$env:QT_ROOT_DIR) {
            Write-Error "QT_ROOT_DIR is not set — install-qt-action may have failed."
            exit 1
          }
          Write-Host "QT_ROOT = $env:QT_ROOT_DIR"
          "QT_ROOT=$env:QT_ROOT_DIR" >> $env:GITHUB_ENV

      # ─── vcpkg: LibArchive (static) ─────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: vcpkg-libarchive-static-v2
      - run: vcpkg install libarchive:x64-windows-static

      # ─── rapidhash (header-only) ────────────────────────────────────────
      - name: Fetch rapidhash.h
        run: |
          $dir = "${{ github.workspace }}\deps\rapidhash"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Nicoshev/rapidhash/master/rapidhash.h" `
            -OutFile "$dir\rapidhash.h"
          "RAPIDHASH_DIR=$dir" >> $env:GITHUB_ENV

      # ─── CMake configure ────────────────────────────────────────────────
      # -DCMAKE_C_STANDARD=17 : CMake 3.31 cannot enable C23 with MSVC.
      #   The project declares C23 but uses no C23-specific features.
      # Visual Studio generator is used because Qt is linked dynamically
      # and this matches the existing proven build configuration.
      - name: Configure
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_STANDARD=17 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT" `
            -DRAPIDHASH_INCLUDE_DIRS="$env:RAPIDHASH_DIR"

      # ─── Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel

      # ─── Deploy Qt DLLs + plugins ───────────────────────────────────────
      # Qt is linked dynamically — the exe needs Qt DLLs and platform
      # plugins at runtime. windeployqt copies everything needed.
      - name: Resolve deploy directory
        run: |
          $dir = Join-Path "${{ github.workspace }}" "${{ env.BUILD_DIR }}\${{ env.EXE_REL_PATH }}"
          "DEPLOY_DIR=$dir" >> $env:GITHUB_ENV

      - name: windeployqt
        run: windeployqt --release --no-translations "$env:DEPLOY_DIR\${{ env.EXE_NAME }}"

      # ─── Compute release metadata ───────────────────────────────────────
      - name: Compute names
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="latest"
          fi

          SUFFIX=""
          [[ "${{ inputs.dev }}" == "true" ]] && SUFFIX="-dev"
          [[ "$TAG" != "latest" ]]            && SUFFIX="${SUFFIX}-${TAG}"

          ARCHIVE="rpgmtranslate${SUFFIX}.7z"
          NAME="rpgmtranslate${SUFFIX}"

          if [[ "$TAG" == "latest" ]]; then
            TITLE="Latest Build"
          else
            TITLE="Release ${TAG}"
          fi
          [[ "${{ inputs.dev }}" == "true" ]] && TITLE="${TITLE} (dev)"

          PRERELEASE="false"
          [[ "${{ inputs.dev }}" == "true" ]] && PRERELEASE="true"

          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE"     >> "$GITHUB_OUTPUT"
          echo "name=$NAME"           >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"         >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      # ─── Package ────────────────────────────────────────────────────────
      # 7z is pre-installed on the runner and faster than Compress-Archive.
      # We archive the entire deploy directory (exe + Qt DLLs + plugins).
      - name: Create .7z archive
        run: |
          7z a -t7z -mx=9 `
            "${{ github.workspace }}\${{ steps.meta.outputs.archive }}" `
            "$env:DEPLOY_DIR\*"

      # ─── Upload artifact ────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ github.workspace }}\${{ steps.meta.outputs.archive }}
          if-no-files-found: error

      # ─── GitHub Release ─────────────────────────────────────────────────
      - name: Remove stale "latest" release
        if: steps.meta.outputs.tag == 'latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          make_latest: ${{ steps.meta.outputs.tag != 'latest' && steps.meta.outputs.prerelease != 'true' }}
          files: ${{ github.workspace }}/${{ steps.meta.outputs.archive }}
