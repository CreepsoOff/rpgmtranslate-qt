# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          rpgmtranslate-qt – Windows x64 build & release workflow        ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  HOW TO PUBLISH A RELEASE                                               ║
# ║  ─────────────────────────                                              ║
# ║  1. Commit and push all changes to your branch.                         ║
# ║  2. Create and push a semver tag:                                       ║
# ║       git tag v1.2.3                                                    ║
# ║       git push origin v1.2.3                                            ║
# ║  3. This workflow builds the app, packages it, and publishes a          ║
# ║     GitHub Release with the ZIP asset automatically.                    ║
# ║                                                                         ║
# ║  You can also trigger a manual build from the GitHub UI:                ║
# ║       Actions → "Build and Release – Windows" → Run workflow            ║
# ║  The optional "version" input (e.g. v1.2.3) lets you name the assets   ║
# ║  and – when provided – also publishes a GitHub Release.                 ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  VARIABLES TO ADJUST IF THE BUILD CONFIGURATION CHANGES                ║
# ║  ───────────────────────────────────────────────────────                ║
# ║  QT_VERSION    Qt version to install.  The project requires Qt 6.x      ║
# ║                with MSVC 2022 64-bit support.                           ║
# ║  BUILD_DIR     CMake build directory (relative to the repository root). ║
# ║  EXE_NAME      Compiled executable name.  Must match PROJECT_NAME in    ║
# ║                CMakeLists.txt (currently "rpgmtranslate").              ║
# ║  EXE_REL_PATH  Path inside BUILD_DIR where the Visual Studio            ║
# ║                multi-config generator places Release binaries.          ║
# ║                CMakeLists.txt sets CMAKE_RUNTIME_OUTPUT_DIRECTORY =     ║
# ║                "target/bin"; VS appends the config sub-folder, giving   ║
# ║                "target\bin\Release".                                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          rpgmtranslate-qt – Windows x64 build & release                 ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Default (no inputs)        → tag "latest", asset: rpgmtranslate.7z    ║
# ║  dev checked                → tag "dev", asset: rpgmtranslate-dev.7z   ║
# ║                                pre-release                             ║
# ║  version = "v1.2.3"         → tag "v1.2.3", asset:                     ║
# ║                                rpgmtranslate-v1.2.3.7z                 ║
# ║  dev + version              → tag "dev", asset:                         ║
# ║                                rpgmtranslate-dev-v1.2.3.7z             ║
# ║                                pre-release                             ║
# ║  Push v* tag                → same as stable versioned release          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: Build and Release – Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version optionnelle (ex: v1.2.3)'
        required: false
        default: ''
        type: string
      dev:
        description: 'Dev build ?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  QT_VERSION: '6.8.2'
  BUILD_DIR: build
  EXE_NAME: rpgmtranslate.exe
  # Visual Studio multi-config + CMAKE_RUNTIME_OUTPUT_DIRECTORY=target/bin
  EXE_REL_PATH: target\bin\Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Rust + cbindgen ─────────────────────────────────────────────────
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index
            ~\.cargo\registry\cache
            ~\.cargo\git\db
          key: cargo-reg-${{ hashFiles('rust/Cargo.toml') }}
          restore-keys: cargo-reg-

      - name: Cache Rust/Corrosion build artefacts
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}\cargo
          key: cargo-build-${{ hashFiles('rust/Cargo.toml', 'rust/src/**') }}
          restore-keys: cargo-build-

      - name: Cache cbindgen binary
        id: cb
        uses: actions/cache@v4
        with:
          path: ~\.cargo\bin\cbindgen.exe
          key: cbindgen-0.29.2

      - name: Install cbindgen
        if: steps.cb.outputs.cache-hit != 'true'
        run: cargo install cbindgen --version 0.29.2

      # ─── Qt 6 (dynamic, MSVC 2022 x64) ──────────────────────────────────
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      # install-qt-action@v4 sets QT_ROOT_DIR (not Qt6_DIR).
      # It already points to the Qt install root containing bin/qmake.exe.
      - name: Resolve Qt root
        shell: pwsh
        run: |
          # v4 of install-qt-action uses QT_ROOT_DIR
          $root = $env:QT_ROOT_DIR

          # Fallback: if somehow Qt6_DIR is set instead (older action version)
          if (!$root) {
            $root = $env:Qt6_DIR
            while ($root -and !(Test-Path (Join-Path $root "bin\qmake.exe"))) {
              $root = Split-Path $root -Parent
            }
          }

          if (!$root -or !(Test-Path (Join-Path $root "bin\qmake.exe"))) {
            throw "Cannot resolve Qt root. QT_ROOT_DIR='$env:QT_ROOT_DIR', Qt6_DIR='$env:Qt6_DIR'"
          }

          Write-Host "QT_ROOT = $root"
          "QT_ROOT=$root" >> $env:GITHUB_ENV

      # ─── vcpkg: LibArchive (static) ─────────────────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: vcpkg-libarchive-static-v2
          restore-keys: vcpkg-libarchive-static-

      - name: Install LibArchive via vcpkg
        run: vcpkg install libarchive:x64-windows-static

      # ─── rapidhash (header-only) ────────────────────────────────────────
      - name: Fetch rapidhash.h
        shell: pwsh
        run: |
          $dir = "${{ github.workspace }}\deps\rapidhash"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Nicoshev/rapidhash/master/rapidhash.h" `
            -OutFile "$dir\rapidhash.h"
          "RAPIDHASH_DIR=$dir" >> $env:GITHUB_ENV

      # ─── CMake configure ────────────────────────────────────────────────
      # CMake 3.31 + MSVC cannot enable C23. The project's CMakeLists.txt
      # sets CMAKE_C_STANDARD=23, which overrides any -D flag (CMake normal
      # variables take priority over cache variables from -D).
      # We patch it to C17 on MSVC before configure. C++23 is unaffected.
      - name: Patch C standard for MSVC compatibility
        shell: pwsh
        run: |
          (Get-Content CMakeLists.txt) -replace `
            'set\(CMAKE_C_STANDARD 23\)', `
            'if(MSVC)`n    set(CMAKE_C_STANDARD 17)`nelse()`n    set(CMAKE_C_STANDARD 23)`nendif()' `
            | Set-Content CMakeLists.txt

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT" `
            -DRAPIDHASH_INCLUDE_DIRS="$env:RAPIDHASH_DIR"

      # ─── Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel

      # ─── Deploy Qt runtime ──────────────────────────────────────────────
      # Qt is linked dynamically — windeployqt copies Qt DLLs and plugins
      # required at runtime into the exe directory.
      - name: Resolve deploy directory
        shell: pwsh
        run: |
          $dir = Join-Path "${{ github.workspace }}" "${{ env.BUILD_DIR }}\${{ env.EXE_REL_PATH }}"
          if (!(Test-Path $dir)) {
            throw "Deploy directory not found: $dir"
          }
          "DEPLOY_DIR=$dir" >> $env:GITHUB_ENV

      - name: Deploy Qt runtime (windeployqt)
        run: windeployqt --release --no-translations "$env:DEPLOY_DIR\${{ env.EXE_NAME }}"

      # ─── Compute release metadata ───────────────────────────────────────
      - name: Compute release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_DEV: ${{ github.event.inputs.dev }}
        run: |
          set -euo pipefail

          VERSION_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+$'

          INPUT_VERSION="${INPUT_VERSION:-}"
          INPUT_DEV="${INPUT_DEV:-false}"

          # Validate version format if provided
          if [[ -n "$INPUT_VERSION" && ! "$INPUT_VERSION" =~ $VERSION_REGEX ]]; then
            echo "::error::The version input must match v1.2.3"
            exit 1
          fi

          TAG=""
          PRERELEASE="false"
          VERSION_FOR_SUFFIX=""

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            # Pushed v* tag → stable versioned release
            if [[ ! "$REF_NAME" =~ $VERSION_REGEX ]]; then
              echo "::error::Pushed tag must match v1.2.3"
              exit 1
            fi
            TAG="$REF_NAME"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX="$REF_NAME"

          elif [[ "$INPUT_DEV" == "true" ]]; then
            # Dev build → tag "dev", pre-release
            TAG="dev"
            PRERELEASE="true"
            VERSION_FOR_SUFFIX="$INPUT_VERSION"

          elif [[ -n "$INPUT_VERSION" ]]; then
            # Version without dev → stable versioned release
            TAG="$INPUT_VERSION"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX="$INPUT_VERSION"

          else
            # No inputs → latest snapshot
            TAG="latest"
            PRERELEASE="false"
            VERSION_FOR_SUFFIX=""
          fi

          # Build suffix: -dev, -v1.2.3, -dev-v1.2.3, or empty
          SUFFIX=""
          [[ "$TAG" == "dev" ]] && SUFFIX="${SUFFIX}-dev"
          [[ -n "$VERSION_FOR_SUFFIX" ]] && SUFFIX="${SUFFIX}-${VERSION_FOR_SUFFIX}"

          NAME="rpgmtranslate${SUFFIX}"
          ARCHIVE="${NAME}.7z"

          # Display title for the GitHub Release
          if [[ "$TAG" == "latest" ]]; then
            TITLE="Latest Build"
            MAKE_LATEST="false"
          elif [[ "$TAG" == "dev" ]]; then
            if [[ -n "$VERSION_FOR_SUFFIX" ]]; then
              TITLE="Dev Build (${VERSION_FOR_SUFFIX})"
            else
              TITLE="Dev Build"
            fi
            MAKE_LATEST="false"
          else
            TITLE="Release ${TAG}"
            MAKE_LATEST="true"
          fi

          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE"       >> "$GITHUB_OUTPUT"
          echo "name=$NAME"             >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"           >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"

      # ─── Package ────────────────────────────────────────────────────────
      # 7z is pre-installed on the runner. Archives the full deploy dir
      # (exe + Qt DLLs + plugins).
      - name: Create .7z archive
        shell: pwsh
        run: |
          7z a -t7z -mx=9 `
            "${{ github.workspace }}\${{ steps.meta.outputs.archive }}" `
            "$env:DEPLOY_DIR\*"

      # ─── Upload artifact ────────────────────────────────────────────────
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ github.workspace }}\${{ steps.meta.outputs.archive }}
          if-no-files-found: error

      # ─── GitHub Release ─────────────────────────────────────────────────
      # For moving tags (latest, dev): delete old release + force-push tag
      - name: Remove stale moving release
        if: steps.meta.outputs.tag == 'latest' || steps.meta.outputs.tag == 'dev'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.meta.outputs.tag }}" 2>/dev/null || true

      - name: Refresh moving tag
        if: steps.meta.outputs.tag == 'latest' || steps.meta.outputs.tag == 'dev'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.meta.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.meta.outputs.tag }}" --force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.title }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            ${{ github.workspace }}/${{ steps.meta.outputs.archive }}
